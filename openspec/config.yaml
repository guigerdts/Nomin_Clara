# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: React 18 + TypeScript (strict) + Vite 5 + Vitest 2
  Architecture: SPA client-side, no backend, CSS Modules + global CSS custom properties
  Testing: Vitest with jsdom, @testing-library/react, 4 test files (66 tests passing)
  Style: CSS Modules per component, global.css for theme vars, responsive
  Strict TDD: true (Vitest available and in active use)

rules:
  proposal:
    - Include scope boundaries and non-goals
    - Document business rules and legal references
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Reference Colombian labor law articles
  design:
    - Include data flow diagrams for complex calculations
    - Document architecture decisions with rationale
    - Separate concerns: legal rates, calculations, UI, storage
  tasks:
    - Group by feature area, use hierarchical numbering
    - Keep tasks completable in one session
    - Order by dependency: legal rates first, then calculator, then comparison
  apply:
    guidelines:
      - Use React + TypeScript strict for all new components
      - Keep legal rates in a separate, well-commented file (lib/rates.ts)
      - Use CSS Modules for component styles, global.css for theme vars
      - Canvas charts via useRef/useEffect (no chart library dependency)
    tdd: true
    test_command: "npx vitest run"
  verify:
    test_command: "npx vitest run"
    build_command: "npx tsc --noEmit && npx vite build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
